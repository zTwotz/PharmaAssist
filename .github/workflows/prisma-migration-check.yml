name: Prisma Migration Check

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  prisma-migration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: pharmaassist_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (Backend)
        working-directory: ./backend
        run: npm ci

      - name: Check Prisma Migrations
        working-directory: ./backend
        env:
          DATABASE_URL: "postgresql://postgres:password@localhost:5432/pharmaassist_test?schema=public"
          DIRECT_URL: "postgresql://postgres:password@localhost:5432/pharmaassist_test?schema=public"
        run: |
          npx prisma migrate deploy
          npx prisma migrate status
